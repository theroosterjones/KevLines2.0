name: KevLines2.0
options:
  bundleIdPrefix: com.kevinjones
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

packages:
  SwiftTasksVision:
    url: https://github.com/paescebu/SwiftTasksVision.git
    from: "0.10.14"

targets:
  KevLines2.0:
    type: application
    platform: iOS
    sources:
      - path: Sources
    preBuildScripts:
      - name: Patch MediaPipe framework plist for App Store validation
        shell: /bin/sh
        script: |
          DERIVED_DATA_ROOT="${BUILD_DIR%/Build/*}"
          IOS_PLIST="${DERIVED_DATA_ROOT}/SourcePackages/checkouts/SwiftTasksVision/Dependencies/MediaPipeTasksVision.xcframework/ios-arm64/MediaPipeTasksVision.framework/Info.plist"
          SIM_PLIST="${DERIVED_DATA_ROOT}/SourcePackages/checkouts/SwiftTasksVision/Dependencies/MediaPipeTasksVision.xcframework/ios-arm64_x86_64-simulator/MediaPipeTasksVision.framework/Info.plist"
          
          patch_plist() {
            plist_path="$1"
            if [ ! -f "$plist_path" ]; then
              return 0
            fi

            /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$plist_path" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$plist_path"

            /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "$plist_path" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${MARKETING_VERSION}" "$plist_path"

            /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "$plist_path" >/dev/null 2>&1 || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${CURRENT_PROJECT_VERSION}" "$plist_path"
          }

          patch_plist "$IOS_PLIST"
          patch_plist "$SIM_PLIST"
    postBuildScripts:
      - name: Patch embedded MediaPipe framework plist for App Store validation
        shell: /bin/sh
        script: |
          EMBEDDED_PLIST="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/MediaPipeTasksVision.framework/Info.plist"
          if [ ! -f "$EMBEDDED_PLIST" ]; then
            exit 0
          fi

          # Remove XCFramework-only keys that appear in the third-party plist.
          /usr/libexec/PlistBuddy -c "Delete :AvailableLibraries" "$EMBEDDED_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Delete :XCFrameworkFormatVersion" "$EMBEDDED_PLIST" >/dev/null 2>&1 || true

          /usr/libexec/PlistBuddy -c "Delete :MinimumOSVersion" "$EMBEDDED_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :MinimumOSVersion string ${IPHONEOS_DEPLOYMENT_TARGET}" "$EMBEDDED_PLIST"

          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "$EMBEDDED_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${MARKETING_VERSION}" "$EMBEDDED_PLIST"

          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "$EMBEDDED_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${CURRENT_PROJECT_VERSION}" "$EMBEDDED_PLIST"

          /usr/libexec/PlistBuddy -c "Delete :CFBundlePackageType" "$EMBEDDED_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :CFBundlePackageType string FMWK" "$EMBEDDED_PLIST"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinjones.KevLines2-0
        PRODUCT_NAME: KevLines2.0
        PRODUCT_MODULE_NAME: KevLines2_0
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_CFBundleDisplayName: "KevLines"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "KevLines needs access to your photo library to select exercise videos for analysis."
        INFOPLIST_KEY_NSCameraUsageDescription: "KevLines uses your camera for real-time exercise form analysis with skeleton overlay."
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: SwiftTasksVision
        product: SwiftTasksVision

  KevLines2.0Tests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kevinjones.KevLines2-0Tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: KevLines2.0
